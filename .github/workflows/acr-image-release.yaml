name: ACR Image Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Kustomize overlay to update after publishing images.
        required: true
        default: aks-dev
        type: choice
        options:
          - aks-dev
          - aks-prod
      image_tag:
        description: Optional image tag. Defaults to git SHA.
        required: false
        type: string
  push:
    branches:
      - master
    paths:
      - create-service-haskell/**
      - delete-service-erlang/**
      - read-service-go/**
      - todo-frontend/**
      - update-service-rust/**
      - .github/workflows/acr-image-release.yaml

permissions:
  contents: write
  id-token: write
  packages: read

concurrency:
  group: acr-image-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DEFAULT_ENVIRONMENT: aks-dev

jobs:
  publish:
    name: Build, SBOM, and push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: create-service
            context: create-service-haskell
          - image: delete-service
            context: delete-service-erlang
          - image: read-service
            context: read-service-go
          - image: todo-frontend
            context: todo-frontend
          - image: update-service
            context: update-service-rust
    outputs:
      image_tag: ${{ steps.release.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        shell: bash
        run: |
          acr_name="${{ vars.ACR_LOGIN_SERVER }}"
          az acr login --name "${acr_name%%.azurecr.io}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          pull: true
          tags: ${{ vars.ACR_LOGIN_SERVER }}/overkilled-todo-app-${{ matrix.image }}:${{ steps.release.outputs.image_tag }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.ACR_LOGIN_SERVER }}/overkilled-todo-app-${{ matrix.image }}:${{ steps.release.outputs.image_tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          if-no-files-found: error

      - name: Push image
        run: docker push ${{ vars.ACR_LOGIN_SERVER }}/overkilled-todo-app-${{ matrix.image }}:${{ steps.release.outputs.image_tag }}

  update-kustomize:
    name: Update AKS image tags
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update overlay images
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ inputs.environment || env.DEFAULT_ENVIRONMENT }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
        run: |
          overlay="k8s/overlays/${TARGET_ENVIRONMENT}"
          test -d "$overlay"
          cd "$overlay"
          kustomize edit set image create-service="${ACR_LOGIN_SERVER}/overkilled-todo-app-create-service:${IMAGE_TAG}"
          kustomize edit set image delete-service="${ACR_LOGIN_SERVER}/overkilled-todo-app-delete-service:${IMAGE_TAG}"
          kustomize edit set image read-service="${ACR_LOGIN_SERVER}/overkilled-todo-app-read-service:${IMAGE_TAG}"
          kustomize edit set image todo-frontend="${ACR_LOGIN_SERVER}/overkilled-todo-app-todo-frontend:${IMAGE_TAG}"
          kustomize edit set image update-service="${ACR_LOGIN_SERVER}/overkilled-todo-app-update-service:${IMAGE_TAG}"
          kustomize build . >/tmp/${TARGET_ENVIRONMENT}.yaml

      - name: Commit updated image tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update AKS image tags to ${{ needs.publish.outputs.image_tag }}"
          file_pattern: k8s/overlays/*/kustomization.yaml
