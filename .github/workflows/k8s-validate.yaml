name: Kubernetes Validation

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    name: Render and validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render local overlay
        run: kubectl kustomize k8s/overlays/local > rendered-local.yaml

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate rendered manifests
        run: kubeconform -strict -summary -ignore-missing-schemas rendered-local.yaml
