apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-service
  labels:
    app.kubernetes.io/name: read-service
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: crud-service
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: read-service
  template:
    metadata:
      labels:
        app: read-service
        app.kubernetes.io/name: read-service
        app.kubernetes.io/part-of: overkilled-todo
        app.kubernetes.io/component: crud-service
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: read-service
          image: read-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_HOST
              value: mariadb
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MYSQL_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MYSQL_PASSWORD
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MYSQL_DATABASE
            - name: DATABASE_PORT
              value: "3306"
---
apiVersion: v1
kind: Service
metadata:
  name: read-service
  labels:
    app.kubernetes.io/name: read-service
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: crud-service
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: read-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
