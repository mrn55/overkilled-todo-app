apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  labels:
    app.kubernetes.io/name: front-end
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
        app.kubernetes.io/name: front-end
        app.kubernetes.io/part-of: overkilled-todo
        app.kubernetes.io/component: frontend
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: front-end
          image: todo-frontend:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: front-end
  labels:
    app.kubernetes.io/name: front-end
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: front-end
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
