apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  labels:
    app.kubernetes.io/name: todo-ingress
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
  annotations:
    app.kubernetes.io/description: Routes local TODO UI and API traffic to the frontend and gateway services.
spec:
  rules:
    - host: localhost
      http:
        paths:
          - path: /todo
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-end
                port:
                  number: 80
