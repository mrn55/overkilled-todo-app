---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  labels:
    app.kubernetes.io/name: phpmyadmin
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: developer-tool
    app.kubernetes.io/managed-by: kustomize
  annotations:
    platform.overkilled.dev/milestone: foundation-polish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
        app.kubernetes.io/name: phpmyadmin
        app.kubernetes.io/part-of: overkilled-todo
        app.kubernetes.io/component: developer-tool
        app.kubernetes.io/managed-by: kustomize
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: phpmyadmin
          image: phpmyadmin/phpmyadmin:5.2.2
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          env:
            - name: PMA_HOST
              value: mariadb
---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
  labels:
    app.kubernetes.io/name: phpmyadmin
    app.kubernetes.io/part-of: overkilled-todo
    app.kubernetes.io/component: developer-tool
    app.kubernetes.io/managed-by: kustomize
  annotations:
    platform.overkilled.dev/milestone: foundation-polish
spec:
  selector:
    app: phpmyadmin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001
  type: NodePort
