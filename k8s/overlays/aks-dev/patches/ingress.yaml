apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  annotations:
    app.kubernetes.io/description: Routes AKS dev TODO UI and API traffic through ingress-nginx.
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: todo-dev.example.com
      http:
        paths:
          - path: /todo
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-end
                port:
                  number: 80
