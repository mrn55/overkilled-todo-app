services:
  db:
    image: mariadb:10.5.27
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.2
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"
    networks:
      - backend

  create-service:
    build: ./create-service-haskell
    environment: &db_env
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_PORT: ${DATABASE_PORT}
    expose:
      - "5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/5001'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  read-service:
    build: ./read-service-go
    environment: *db_env
    expose:
      - "5002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5002/todo"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  update-service:
    build: ./update-service-rust
    environment: *db_env
    expose:
      - "5003"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/5003'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  delete-service:
    build: ./delete-service-erlang
    environment: *db_env
    expose:
      - "5004"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5004"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api-gateway:
    image: nginx:1.27.4-alpine
    volumes:
      - ./api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      create-service:
        condition: service_healthy
      read-service:
        condition: service_healthy
      update-service:
        condition: service_healthy
      delete-service:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  todo-frontend:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  create-service-debug:
    profiles: ["backend-ports"]
    extends:
      service: create-service
    ports:
      - "5001:5001"

  read-service-debug:
    profiles: ["backend-ports"]
    extends:
      service: read-service
    ports:
      - "5002:5002"

  update-service-debug:
    profiles: ["backend-ports"]
    extends:
      service: update-service
    ports:
      - "5003:5003"

  delete-service-debug:
    profiles: ["backend-ports"]
    extends:
      service: delete-service
    ports:
      - "5004:5004"

volumes:
  mysql_data:

networks:
  frontend:
  backend:
    internal: true
