apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: todo-app
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/overlays/aks-dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 3m
  wait: true
  postBuild:
    substitute:
      cluster_name: aks-dev
