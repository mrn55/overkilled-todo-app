apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml
configMapGenerator:
  - name: grafana-dashboard-todo-overview
    files:
      - todo-overview.json=dashboards/todo-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/name: grafana-dashboard-todo-overview
        app.kubernetes.io/part-of: overkilled-todo-platform
  - name: grafana-dashboard-service-golden-signals
    files:
      - service-golden-signals.json=dashboards/service-golden-signals.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/name: grafana-dashboard-service-golden-signals
        app.kubernetes.io/part-of: overkilled-todo-platform
generatorOptions:
  disableNameSuffixHash: true
